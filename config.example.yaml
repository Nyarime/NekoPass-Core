# NekoPass Core 客户端配置

server: "your-server.com:443"
password: "your-password"
sni: "vpn.example.edu"
mode: "rule"              # rule(分流) / global(全代理) / direct(全直连)
transport: "auto"         # auto(默认) / udp / tcp
fec_type: "rs"            # rs(默认) / raptorq / ldpc

# 代理监听
proxy:
  listen: "127.0.0.1:1080"    # HTTP/HTTPS/SOCKS5 共用端口

# TUN 模式（可选）
# tun:
#   enable: false
#   name: "utun8"
#   mtu: 1400
#   dns: "8.8.8.8"

# 分流规则（默认绕过 CN）
rules:
  # 国内域名直连
  - "DOMAIN-SUFFIX,cn,DIRECT"
  - "DOMAIN-SUFFIX,local,DIRECT"
  - "DOMAIN-KEYWORD,baidu,DIRECT"
  - "DOMAIN-KEYWORD,aliyun,DIRECT"
  - "DOMAIN-KEYWORD,tencent,DIRECT"
  - "DOMAIN-KEYWORD,weixin,DIRECT"
  - "DOMAIN-KEYWORD,qq.com,DIRECT"
  - "DOMAIN-KEYWORD,taobao,DIRECT"
  - "DOMAIN-KEYWORD,jd.com,DIRECT"
  - "DOMAIN-KEYWORD,bilibili,DIRECT"
  - "DOMAIN-KEYWORD,163.com,DIRECT"
  - "DOMAIN-KEYWORD,douyin,DIRECT"
  - "DOMAIN-KEYWORD,bytedance,DIRECT"
  # IPv4 私有地址
  - "IP-CIDR,10.0.0.0/8,DIRECT"
  - "IP-CIDR,127.0.0.0/8,DIRECT"
  - "IP-CIDR,172.16.0.0/12,DIRECT"
  - "IP-CIDR,192.168.0.0/16,DIRECT"
  - "IP-CIDR,169.254.0.0/16,DIRECT"
  # IPv6 私有/本地地址
  - "IP-CIDR6,::1/128,DIRECT"
  - "IP-CIDR6,fc00::/7,DIRECT"
  - "IP-CIDR6,fe80::/10,DIRECT"
  - "IP-CIDR6,::ffff:0:0/96,DIRECT"
  # GeoIP
  - "GEOIP,CN,DIRECT"
  - "MATCH,PROXY"

# 系统代理（启动时设置，退出时恢复）
system_proxy: false

# GFWList（自动加载被墙域名规则）
gfwlist: true

# 智能传输
smart:
  recover_interval: "5m"
